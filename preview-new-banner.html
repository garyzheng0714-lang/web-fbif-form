<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顶部 Banner 预览 - 新 vs 旧</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f5; font-family: -apple-system, sans-serif; padding: 20px; }
  h2 { text-align: center; margin: 20px 0 10px; color: #333; font-size: 18px; }
  .label { text-align: center; color: #999; font-size: 13px; margin-bottom: 10px; }
  .container { max-width: 420px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; overflow: hidden; margin-bottom: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .card img { width: 100%; display: block; }
  .card .body { padding: 16px; }
  .card .body .title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
  .card .body .sub { font-size: 12px; color: #999; margin-top: 4px; }
  .divider { border: none; border-top: 1px dashed #ddd; margin: 10px 0 20px; }
</style>
</head>
<body>
<div class="container">
  <h2>新 Banner</h2>
  <p class="label">1280x593, WebP 41KB</p>
  <div class="card">
    <img src="/tmp/new_banner2.webp" alt="新 Banner">
    <div class="body">
      <div class="title">FBIF 食品创新展 2026</div>
      <div class="sub">顶部 Banner 效果预览</div>
    </div>
  </div>

  <hr class="divider">

  <h2>旧 Banner</h2>
  <p class="label">当前线上版本</p>
  <div class="card">
    <img src="https://fbif-feishu-base.oss-cn-shanghai.aliyuncs.com/fbif-attachment-to-url/2026/02/tblMQeXvSGd7Hebf_YHcyINOqnzM9YxjJToK2RA_1770366619961/img_v3_02ul_3790aefe-c6b6-473f-9c05-97aa380983bg_1770366621905.jpg" alt="旧 Banner">
    <div class="body">
      <div class="title">FBIF 食品创新展 2026</div>
      <div class="sub">当前线上版本</div>
    </div>
  </div>
</div>
</body>
</html>
