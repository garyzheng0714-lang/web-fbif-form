<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FBIF 2026 - 观展身份选择（重设计）</title>
  <style>
    :root {
      /* 主色调 - 更深沉优雅的蓝 */
      --primary-50: #eff6ff;
      --primary-100: #dbeafe;
      --primary-200: #bfdbfe;
      --primary-300: #93c5fd;
      --primary-400: #60a5fa;
      --primary-500: #3b82f6;
      --primary-600: #2563eb;
      --primary-700: #1d4ed8;
      --primary-800: #1e40af;
      --primary-900: #1e3a8a;

      /* 中性色 - 更细腻的灰阶 */
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --slate-900: #0f172a;

      /* 功能色 */
      --gold-100: #fef3c7;
      --gold-500: #f59e0b;
      --gold-600: #d97706;
      --emerald-100: #d1fae5;
      --emerald-500: #10b981;
      --emerald-600: #059669;

      /* 背景 */
      --bg-gradient: radial-gradient(ellipse at top, #f8fafc 0%, #f1f5f9 100%);
      --surface: #ffffff;

      /* 阴影 - 更细腻的多层阴影 */
      --shadow-xs: 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow-sm: 0 2px 4px rgba(15, 23, 42, 0.06), 0 1px 2px rgba(15, 23, 42, 0.03);
      --shadow-md: 0 4px 8px rgba(15, 23, 42, 0.06), 0 2px 4px rgba(15, 23, 42, 0.04);
      --shadow-lg: 0 8px 24px rgba(15, 23, 42, 0.08), 0 4px 8px rgba(15, 23, 42, 0.04);
      --shadow-xl: 0 16px 48px rgba(15, 23, 42, 0.1), 0 8px 16px rgba(15, 23, 42, 0.05);
      --shadow-glow: 0 0 40px rgba(37, 99, 235, 0.15);

      /* 动效 */
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.25, 0.46, 0.45, 0.94);

      /* 圆角 */
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --radius-2xl: 28px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    /* 顶部标题区域 */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: rgba(37, 99, 235, 0.06);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary-700);
      letter-spacing: 0.2px;
      margin-bottom: 12px;
    }

    .eyebrow-icon {
      width: 14px;
      height: 14px;
    }

    .title {
      font-size: clamp(28px, 4vw, 36px);
      font-weight: 700;
      color: var(--slate-900);
      letter-spacing: -0.5px;
      line-height: 1.15;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 16px;
      color: var(--slate-500);
      line-height: 1.5;
    }

    /* 选项卡片 */
    .options-grid {
      display: grid;
      gap: 14px;
      margin-bottom: 24px;
    }

    .option-card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 22px 20px;
      background: var(--surface);
      border: 1.5px solid var(--slate-200);
      border-radius: var(--radius-xl);
      cursor: pointer;
      transition: all 0.28s var(--ease-out-expo);
      overflow: hidden;
    }

    .option-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, var(--primary-50) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.28s var(--ease-out-expo);
      pointer-events: none;
    }

    .option-card:hover {
      border-color: var(--primary-300);
      box-shadow: var(--shadow-md), var(--shadow-glow);
      transform: translateY(-1px);
    }

    .option-card:hover::before {
      opacity: 1;
    }

    .option-card.is-active {
      border-color: var(--primary-600);
      background: linear-gradient(135deg, var(--primary-50) 0%, var(--surface) 100%);
      box-shadow: var(--shadow-lg), 0 0 0 3px rgba(37, 99, 235, 0.08);
      transform: translateY(-2px);
    }

    .option-card.is-active::before {
      opacity: 1;
    }

    /* 图标区域 */
    .option-icon-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .option-icon {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.28s var(--ease-out-expo);
    }

    .option-card.is-active .option-icon {
      transform: scale(1.05);
    }

    .option-icon svg {
      width: 28px;
      height: 28px;
    }

    /* 专业观众 - 深邃蓝渐变 */
    .option-icon--industry {
      background: linear-gradient(135deg, var(--primary-600) 0%, var(--primary-800) 100%);
      color: white;
      box-shadow:
        inset 0 1px 2px rgba(255, 255, 255, 0.15),
        0 4px 12px rgba(37, 99, 235, 0.25);
    }

    /* 消费者 - 温暖金渐变 */
    .option-icon--consumer {
      background: linear-gradient(135deg, var(--gold-500) 0%, var(--gold-600) 100%);
      color: white;
      box-shadow:
        inset 0 1px 2px rgba(255, 255, 255, 0.2),
        0 4px 12px rgba(245, 158, 11, 0.25);
    }

    /* 选中状态的颜色变化 */
    .option-card.is-active .option-icon--industry {
      box-shadow:
        inset 0 1px 2px rgba(255, 255, 255, 0.2),
        0 6px 20px rgba(37, 99, 235, 0.35);
    }

    .option-card.is-active .option-icon--consumer {
      box-shadow:
        inset 0 1px 2px rgba(255, 255, 255, 0.25),
        0 6px 20px rgba(245, 158, 11, 0.35);
    }

    /* 内容区域 */
    .option-content {
      flex: 1;
      min-width: 0;
      position: relative;
      z-index: 1;
    }

    .option-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .option-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--slate-800);
      letter-spacing: -0.2px;
    }

    .option-card.is-active .option-title {
      color: var(--primary-700);
    }

    /* 标签设计 */
    .option-tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 999px;
      letter-spacing: 0.2px;
    }

    .option-tag--need {
      background: rgba(245, 158, 11, 0.12);
      color: var(--gold-600);
    }

    .option-tag--free {
      background: rgba(16, 185, 129, 0.12);
      color: var(--emerald-600);
    }

    .option-desc {
      font-size: 14px;
      color: var(--slate-500);
      line-height: 1.5;
    }

    .option-desc b {
      font-weight: 600;
      color: var(--slate-700);
    }

    /* 选择指示器 */
    .option-indicator {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--slate-300);
      flex-shrink: 0;
      transition: all 0.2s var(--ease-out-expo);
      position: relative;
    }

    .option-card.is-active .option-indicator {
      border-color: var(--primary-600);
      background: var(--primary-600);
    }

    .option-indicator::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      transition: transform 0.18s var(--ease-out-expo);
    }

    .option-card.is-active .option-indicator::after {
      transform: translate(-50%, -50%) scale(1);
    }

    /* 年龄提示 */
    .age-notice {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 18px;
      background: linear-gradient(135deg, #fef2f2 0%, #fff1f0 100%);
      border: 1px solid rgba(239, 68, 68, 0.15);
      border-radius: var(--radius-lg);
      font-size: 14px;
      color: var(--slate-700);
      text-align: center;
    }

    .age-notice-icon {
      width: 18px;
      height: 18px;
      color: #ef4444;
      flex-shrink: 0;
    }

    /* 底部装饰 */
    .footer-note {
      text-align: center;
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--slate-200);
    }

    .footer-note p {
      font-size: 13px;
      color: var(--slate-400);
      line-height: 1.6;
    }

    /* 图标 SVG */
    .industry-icon-svg {
      /* 公文包图标 */
    }

    .consumer-icon-svg {
      /* 人群图标 */
    }

    /* 响应式 */
    @media (max-width: 480px) {
      body {
        padding: 16px 12px;
      }

      .option-card {
        padding: 18px 16px;
        gap: 14px;
      }

      .option-icon {
        width: 48px;
        height: 48px;
      }

      .option-icon svg {
        width: 24px;
        height: 24px;
      }

      .option-title {
        font-size: 16px;
      }

      .option-desc {
        font-size: 13px;
      }
    }

    /* 微动效 */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .header {
      animation: float 4s var(--ease-spring) infinite;
    }

    /* 聚焦状态 */
    .option-card:focus-visible {
      outline: none;
      box-shadow:
        0 0 0 2px var(--surface),
        0 0 0 4px var(--primary-400);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <header class="header">
      <div class="eyebrow">
        <svg class="eyebrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 6v6l4 2"/>
        </svg>
        FBIF 2026 观众注册
      </div>
      <h1 class="title">请选择您的观展身份</h1>
      <p class="subtitle">根据您的身份，我们将为您发放对应的观展票</p>
    </header>

    <!-- 选项 -->
    <div class="options-grid">
      <!-- 专业观众 -->
      <div class="option-card is-active" tabindex="0" role="radio" aria-checked="true">
        <div class="option-icon-wrap">
          <div class="option-icon option-icon--industry">
            <svg class="industry-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="7" width="20" height="14" rx="2"/>
              <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
              <line x1="2" y1="13" x2="22" y2="13"/>
            </svg>
          </div>
        </div>
        <div class="option-content">
          <div class="option-header">
            <span class="option-title">专业观众注册</span>
            <span class="option-tag option-tag--need">需审核</span>
          </div>
          <p class="option-desc">4 月 27-29 日展区票（<b>3 日通票</b>）</p>
        </div>
        <div class="option-indicator"></div>
      </div>

      <!-- 消费者 -->
      <div class="option-card" tabindex="0" role="radio" aria-checked="false">
        <div class="option-icon-wrap">
          <div class="option-icon option-icon--consumer">
            <svg class="consumer-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="3"/>
              <path d="M6 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
              <circle cx="18" cy="10" r="2" opacity="0.6"/>
              <path d="M15 20c0-2 1.3-3.7 3-4.5" opacity="0.6"/>
            </svg>
          </div>
        </div>
        <div class="option-content">
          <div class="option-header">
            <span class="option-title">消费者注册</span>
            <span class="option-tag option-tag--free">免审核</span>
          </div>
          <p class="option-desc">4 月 29 日展区票（<b>1 日票</b>）</p>
        </div>
        <div class="option-indicator"></div>
      </div>
    </div>

    <!-- 年龄提示 -->
    <div class="age-notice">
      <svg class="age-notice-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 9v4"/>
        <path d="M12 17h.01"/>
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      </svg>
      <span>16 岁以下观众禁止入场，请勿注册</span>
    </div>

    <!-- 底部注释 -->
    <footer class="footer-note">
      <p>门票审核结果将通过短信通知，请注意查收</p>
    </footer>
  </div>

  <script>
    // 交互逻辑
    const cards = document.querySelectorAll('.option-card');

    cards.forEach(card => {
      card.addEventListener('click', () => {
        cards.forEach(c => {
          c.classList.remove('is-active');
          c.setAttribute('aria-checked', 'false');
        });
        card.classList.add('is-active');
        card.setAttribute('aria-checked', 'true');
      });

      // 键盘导航
      card.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          card.click();
        }
      });
    });
  </script>
</body>
</html>
