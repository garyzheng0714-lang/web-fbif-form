<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方案3优化版 - 现代简约</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* 色彩系统 */
      --bg: #f5f5f7;
      --surface: #ffffff;
      --text-primary: #1d1d1f;
      --text-secondary: #86868b;
      --text-tertiary: #a1a1a6;
      --blue: #0071e3;
      --blue-light: #e8f4fd;
      --orange: #ff9500;
      --orange-light: #fff4e6;
      --green: #34c759;
      --green-light: #e8f5e9;
      --border: #d2d2d7;
      --border-hover: #c7c7cc;

      /* 阴影系统 */
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
      --shadow-glow: 0 0 0 3px rgba(0,113,227,0.15);

      /* 动效 */
      --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 20px 48px;
    }

    /* Banner - 保持原样 */
    .banner {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      margin-bottom: 32px;
    }

    /* 标题 */
    .header {
      margin-bottom: 28px;
      padding: 0 4px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 15px;
      color: var(--text-secondary);
    }

    /* 选项容器 */
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* 选项卡片 */
    .option {
      position: relative;
      padding: 20px 24px;
      border-radius: 16px;
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow-sm);
      border: 2px solid transparent;
      transition: all 0.3s var(--ease-smooth);
    }

    .option:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
      border-color: var(--border-hover);
    }

    .option.is-selected {
      border-color: var(--blue);
      box-shadow: var(--shadow-md), var(--shadow-glow);
      transform: translateY(-2px);
    }

    /* 图标容器 */
    .option-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.3s var(--ease-spring);
    }

    .option.is-selected .option-icon {
      transform: scale(1.05);
    }

    .option-icon svg {
      width: 26px;
      height: 26px;
    }

    .icon-industry {
      background: linear-gradient(135deg, var(--blue-light) 0%, #d4e9f7 100%);
      color: var(--blue);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.8), 0 2px 8px rgba(0,113,227,0.15);
    }

    .icon-consumer {
      background: linear-gradient(135deg, var(--orange-light) 0%, #ffe8cc 100%);
      color: var(--orange);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.8), 0 2px 8px rgba(255,149,0,0.15);
    }

    /* 内容区域 */
    .option-content {
      flex: 1;
      min-width: 0;
    }

    .option-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .option-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.2px;
    }

    .option-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .tag-need {
      background: var(--orange-light);
      color: #e67700;
    }

    .tag-free {
      background: var(--green-light);
      color: #2e7d32;
    }

    .option-desc {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* 选中指示器 */
    .option-check {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.25s var(--ease-spring);
    }

    .option:hover .option-check {
      border-color: var(--border-hover);
    }

    .option.is-selected .option-check {
      border-color: var(--blue);
      background: var(--blue);
    }

    .option-check svg {
      width: 12px;
      height: 12px;
      color: white;
      opacity: 0;
      transform: scale(0);
      transition: all 0.2s var(--ease-spring);
    }

    .option.is-selected .option-check svg {
      opacity: 1;
      transform: scale(1);
    }

    /* 底部提示 */
    .notice {
      margin-top: 32px;
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
      padding: 16px;
    }

    /* 响应式 */
    @media (max-width: 480px) {
      .container {
        padding: 0 16px 40px;
      }

      .option {
        padding: 16px 20px;
      }

      .option-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
      }

      .option-icon svg {
        width: 24px;
        height: 24px;
      }

      .header h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="banner" src="https://fbif-feishu-base.oss-cn-shanghai.aliyuncs.com/fbif-attachment-to-url/2026/02/tblMQeXvSGd7Hebf_YHcyINOqnzM9YxjJToK2RA_1770366619961/img_v3_02ul_3790aefe-c6b6-473f-9c05-97aa380983bg_1770366621905.jpg" alt="FBIF 2026">

    <div class="header">
      <h1>选择您的观展身份</h1>
      <p>根据您的身份，为您发放对应的观展票</p>
    </div>

    <div class="options">
      <div class="option is-selected" onclick="select(this)">
        <div class="option-icon icon-industry">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          </svg>
        </div>
        <div class="option-content">
          <div class="option-title-row">
            <span class="option-title">专业观众</span>
            <span class="option-tag tag-need">需审核</span>
          </div>
          <div class="option-desc">4 月 27-29 日展区票（<b>3</b> 日票）</div>
        </div>
        <div class="option-check">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      </div>

      <div class="option" onclick="select(this)">
        <div class="option-icon icon-consumer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
          </svg>
        </div>
        <div class="option-content">
          <div class="option-title-row">
            <span class="option-title">消费者</span>
            <span class="option-tag tag-free">免审核</span>
          </div>
          <div class="option-desc">4 月 29 日展区票（<b>1</b> 日票）</div>
        </div>
        <div class="option-check">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="notice">16岁以下观众禁止入场</div>
  </div>

  <script>
    function select(el) {
      document.querySelectorAll('.option').forEach(o => o.classList.remove('is-selected'));
      el.classList.add('is-selected');
    }
  </script>
</body>
</html>
