<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方案1 - 极简留白</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
      background: #fff;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 640px; margin: 0 auto; padding: 0 24px 48px; }
    .banner {
      width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; margin-bottom: 48px;
    }
    .header { margin-bottom: 40px; }
    .header h1 { font-size: 28px; font-weight: 600; color: #000; letter-spacing: -0.5px; margin-bottom: 8px; }
    .header p { font-size: 17px; color: #666; }

    .options { display: flex; flex-direction: column; gap: 16px; }
    .option {
      padding: 28px;
      border-radius: 20px;
      background: #f5f5f7;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex; align-items: center; gap: 20px;
    }
    .option:hover { background: #eeeef0; }
    .option.is-selected { background: #000; }

    .option-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: #fff; display: flex; align-items: center; justify-content: center;
    }
    .option.is-selected .option-icon { background: rgba(255,255,255,0.15); }
    .option-icon svg { width: 28px; height: 28px; color: #000; }
    .option.is-selected .option-icon svg { color: #fff; }

    .option-content { flex: 1; }
    .option-title { font-size: 19px; font-weight: 600; color: #000; margin-bottom: 4px; }
    .option.is-selected .option-title { color: #fff; }
    .option-desc { font-size: 15px; color: #666; }
    .option.is-selected .option-desc { color: rgba(255,255,255,0.7); }
    .option-tag {
      font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 6px;
      background: rgba(0,0,0,0.06); color: #333; margin-left: 8px;
    }
    .option.is-selected .option-tag { background: rgba(255,255,255,0.2); color: #fff; }

    .option-check {
      width: 28px; height: 28px; border-radius: 50%; border: 2px solid #ccc;
      display: flex; align-items: center; justify-content: center;
    }
    .option.is-selected .option-check { border-color: #fff; background: #fff; }
    .option-check svg { width: 14px; height: 14px; color: #000; opacity: 0; }
    .option.is-selected .option-check svg { opacity: 1; }

    .notice { margin-top: 40px; text-align: center; font-size: 14px; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <img class="banner" src="https://fbif-feishu-base.oss-cn-shanghai.aliyuncs.com/fbif-attachment-to-url/2026/02/tblMQeXvSGd7Hebf_YHcyINOqnzM9YxjJToK2RA_1770366619961/img_v3_02ul_3790aefe-c6b6-473f-9c05-97aa380983bg_1770366621905.jpg" alt="FBIF 2026">
    <div class="header">
      <h1>选择您的观展身份</h1>
      <p>根据您的身份，为您发放对应的观展票</p>
    </div>
    <div class="options">
      <div class="option is-selected" onclick="select(this)">
        <div class="option-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          </svg>
        </div>
        <div class="option-content">
          <div class="option-title">专业观众<span class="option-tag">需审核</span></div>
          <div class="option-desc">4月27-29日 · 3日通票</div>
        </div>
        <div class="option-check">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
      </div>
      <div class="option" onclick="select(this)">
        <div class="option-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
          </svg>
        </div>
        <div class="option-content">
          <div class="option-title">消费者<span class="option-tag">免审核</span></div>
          <div class="option-desc">4月29日 · 1日票</div>
        </div>
        <div class="option-check">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
      </div>
    </div>
    <div class="notice">16岁以下观众禁止入场</div>
  </div>
  <script>
    function select(el) {
      document.querySelectorAll('.option').forEach(o => o.classList.remove('is-selected'));
      el.classList.add('is-selected');
    }
  </script>
</body>
</html>
