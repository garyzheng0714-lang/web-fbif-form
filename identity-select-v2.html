<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FBIF 2026 - 观展身份选择</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #fafafa;
      min-height: 100vh;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    /* Banner - 保持原样 */
    .banner {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 0;
      margin-bottom: 32px;
      display: block;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }

    /* 标题区域 - 极简 */
    .header {
      margin-bottom: 40px;
      padding: 0 4px;
    }

    .header-title {
      font-size: 24px;
      font-weight: 600;
      color: #111;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
    }

    .header-subtitle {
      font-size: 15px;
      color: #666;
      font-weight: 400;
    }

    /* 选项容器 */
    .role-selector {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    /* 选项卡片 - 极简但有质感 */
    .role-card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 24px 20px;
      background: #fff;
      border: 1px solid #e5e5e5;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .role-card:hover {
      border-color: #ccc;
      background: #fcfcfc;
    }

    .role-card.is-selected {
      border-color: #111;
      background: #111;
    }

    /* 图标 - 几何抽象 */
    .role-icon {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .role-card.is-selected .role-icon {
      color: #fff;
    }

    /* 专业观众图标 - 几何建筑感 */
    .icon-industry svg {
      width: 32px;
      height: 32px;
    }

    /* 消费者图标 - 抽象人形 */
    .icon-consumer svg {
      width: 32px;
      height: 32px;
    }

    /* 内容区域 */
    .role-content {
      flex: 1;
      min-width: 0;
    }

    .role-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .role-title {
      font-size: 17px;
      font-weight: 600;
      color: #111;
      letter-spacing: -0.2px;
    }

    .role-card.is-selected .role-title {
      color: #fff;
    }

    /* 标签 - 极简 */
    .role-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border: 1px solid currentColor;
      color: #999;
    }

    .role-card.is-selected .role-badge {
      color: rgba(255,255,255,0.6);
      border-color: rgba(255,255,255,0.3);
    }

    .role-desc {
      font-size: 14px;
      color: #666;
      line-height: 1.5;
    }

    .role-card.is-selected .role-desc {
      color: rgba(255,255,255,0.7);
    }

    /* 选中标记 - 极简 */
    .role-check {
      width: 20px;
      height: 20px;
      border: 1.5px solid #ccc;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .role-card.is-selected .role-check {
      border-color: #fff;
      background: #fff;
    }

    .role-check svg {
      width: 12px;
      height: 12px;
      color: #111;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.2s ease;
    }

    .role-card.is-selected .role-check svg {
      opacity: 1;
      transform: scale(1);
    }

    /* 年龄提示 - 极简 */
    .notice {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px;
      font-size: 13px;
      color: #888;
      border-top: 1px solid #eee;
      margin-top: 8px;
    }

    .notice svg {
      width: 16px;
      height: 16px;
      color: #c00;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Banner 保持不变 -->
    <img class="banner" src="https://fbif-feishu-base.oss-cn-shanghai.aliyuncs.com/fbif-attachment-to-url/2026/02/tblMQeXvSGd7Hebf_YHcyINOqnzM9YxjJToK2RA_1770366619961/img_v3_02ul_3790aefe-c6b6-473f-9c05-97aa380983bg_1770366621905.jpg" alt="FBIF 2026">

    <!-- 标题 -->
    <header class="header">
      <h1 class="header-title">选择观展身份</h1>
      <p class="header-subtitle">根据您的身份，为您发放对应的观展票</p>
    </header>

    <!-- 选项 -->
    <div class="role-selector">
      <!-- 专业观众 -->
      <div class="role-card is-selected" role="radio" aria-checked="true">
        <div class="role-icon icon-industry">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="6" y="12" width="20" height="14" rx="1"/>
            <path d="M10 12V8a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v4"/>
            <line x1="6" y1="18" x2="26" y2="18"/>
          </svg>
        </div>
        <div class="role-content">
          <div class="role-title-row">
            <span class="role-title">专业观众</span>
            <span class="role-badge">需审核</span>
          </div>
          <p class="role-desc">4月27-29日 · 3日通票</p>
        </div>
        <div class="role-check">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2,6 5,9 10,3"/>
          </svg>
        </div>
      </div>

      <!-- 消费者 -->
      <div class="role-card" role="radio" aria-checked="false">
        <div class="role-icon icon-consumer">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="16" cy="10" r="4"/>
            <path d="M8 26c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
          </svg>
        </div>
        <div class="role-content">
          <div class="role-title-row">
            <span class="role-title">消费者</span>
            <span class="role-badge">免审核</span>
          </div>
          <p class="role-desc">4月29日 · 1日票</p>
        </div>
        <div class="role-check">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2,6 5,9 10,3"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- 提示 -->
    <div class="notice">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="8" cy="8" r="6"/>
        <path d="M8 5v3"/>
        <circle cx="8" cy="11" r="0.5"/>
      </svg>
      16岁以下观众禁止入场
    </div>
  </div>

  <script>
    document.querySelectorAll('.role-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.role-card').forEach(c => {
          c.classList.remove('is-selected');
          c.setAttribute('aria-checked', 'false');
        });
        card.classList.add('is-selected');
        card.setAttribute('aria-checked', 'true');
      });
    });
  </script>
</body>
</html>
