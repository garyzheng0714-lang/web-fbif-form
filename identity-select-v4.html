<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FBIF 2026 - 观展身份选择</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    /* Banner */
    .banner {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      margin-bottom: 32px;
    }

    /* 标题区 */
    .header {
      padding: 0 4px;
      margin-bottom: 28px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1d1d1f;
      letter-spacing: -0.2px;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 15px;
      color: #86868b;
      font-weight: 400;
    }

    /* 选项卡片 */
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 2px solid transparent;
    }

    .option:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .option.is-selected {
      border-color: #0071e3;
      box-shadow: 0 4px 16px rgba(0,113,227,0.15);
    }

    /* 图标 */
    .option-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .option-icon svg {
      width: 26px;
      height: 26px;
    }

    .option-icon.industry {
      background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
      color: #1565c0;
    }

    .option-icon.consumer {
      background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
      color: #e65100;
    }

    .option.is-selected .option-icon {
      transform: scale(1.05);
    }

    /* 内容 */
    .option-content {
      flex: 1;
    }

    .option-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .option-title {
      font-size: 17px;
      font-weight: 600;
      color: #1d1d1f;
    }

    .option-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      background: #f5f5f7;
      color: #86868b;
    }

    .option-tag.need {
      background: #fff3e0;
      color: #e65100;
    }

    .option-tag.free {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .option-desc {
      font-size: 14px;
      color: #86868b;
    }

    /* 选中标记 */
    .option-check {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #d2d2d7;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .option.is-selected .option-check {
      border-color: #0071e3;
      background: #0071e3;
    }

    .option-check svg {
      width: 12px;
      height: 12px;
      color: #fff;
      opacity: 0;
      transform: scale(0);
      transition: all 0.2s ease;
    }

    .option.is-selected .option-check svg {
      opacity: 1;
      transform: scale(1);
    }

    /* 底部提示 */
    .notice {
      margin-top: 28px;
      text-align: center;
      padding: 16px;
    }

    .notice span {
      font-size: 13px;
      color: #86868b;
    }

    @media (max-width: 480px) {
      .container {
        padding: 0 16px 32px;
      }

      .option {
        padding: 16px;
      }

      .option-icon {
        width: 48px;
        height: 48px;
      }

      .header h1 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="banner" src="https://fbif-feishu-base.oss-cn-shanghai.aliyuncs.com/fbif-attachment-to-url/2026/02/tblMQeXvSGd7Hebf_YHcyINOqnzM9YxjJToK2RA_1770366619961/img_v3_02ul_3790aefe-c6b6-473f-9c05-97aa380983bg_1770366621905.jpg" alt="FBIF 2026">

    <div class="header">
      <h1>选择您的观展身份</h1>
      <p>根据您的身份，为您发放对应的观展票</p>
    </div>

    <div class="options">
      <div class="option is-selected" role="radio" aria-checked="true">
        <div class="option-icon industry">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
            <line x1="2" y1="13" x2="22" y2="13"/>
          </svg>
        </div>
        <div class="option-content">
          <div class="option-title-row">
            <span class="option-title">专业观众</span>
            <span class="option-tag need">需审核</span>
          </div>
          <div class="option-desc">4月27-29日 · 3日通票</div>
        </div>
        <div class="option-check">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      </div>

      <div class="option" role="radio" aria-checked="false">
        <div class="option-icon consumer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
          </svg>
        </div>
        <div class="option-content">
          <div class="option-title-row">
            <span class="option-title">消费者</span>
            <span class="option-tag free">免审核</span>
          </div>
          <div class="option-desc">4月29日 · 1日票</div>
        </div>
        <div class="option-check">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="notice">
      <span>16岁以下观众禁止入场</span>
    </div>
  </div>

  <script>
    document.querySelectorAll('.option').forEach(opt => {
      opt.addEventListener('click', () => {
        document.querySelectorAll('.option').forEach(o => {
          o.classList.remove('is-selected');
          o.setAttribute('aria-checked', 'false');
        });
        opt.classList.add('is-selected');
        opt.setAttribute('aria-checked', 'true');
      });
    });
  </script>
</body>
</html>
